<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Authentication</title>
    <meta name="description" content="A premium login and registration portal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <!-- Toast Notification system -->
        <div id="toast-container" class="toast-container"></div>
        
        <div class="glass-panel" id="auth-panel">
            
            <!-- Login View -->
            <div id="login-view" class="auth-view active-view">
                <div class="header">
                    <h1>Welcome Back</h1>
                    <p>Enter your credentials to access your account</p>
                </div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="login-userId">User ID</label>
                        <input type="number" id="login-userId" name="userId" placeholder="Enter your User ID" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" id="login-btn">
                        <span class="btn-text">Sign In</span>
                        <div class="loader hidden" id="login-loader"></div>
                    </button>
                    
                    <div class="toggle-text">
                        Don't have an account? <a href="#" id="go-to-register">Register now</a>
                    </div>
                </form>
            </div>

            <!-- Registration View -->
            <div id="register-view" class="auth-view hidden-view">
                <div class="header">
                    <h1>Create Account</h1>
                    <p>Generate a secure account instantly</p>
                </div>
                
                <form id="register-form">
                    <!-- Note: userId is auto-generated by DB, we only ask for password -->
                    <div class="input-group">
                        <label for="register-password">Create Password</label>
                        <input type="password" id="register-password" name="password" placeholder="Create a strong password" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="register-confirm-password">Confirm Password</label>
                        <input type="password" id="register-confirm-password" placeholder="Confirm your password" required>
                    </div>
                    
                    <button type="submit" class="btn primary-btn" id="register-btn">
                        <span class="btn-text">Create Account</span>
                        <div class="loader hidden" id="register-loader"></div>
                    </button>
                    
                    <div class="toggle-text">
                        Already have an account? <a href="#" id="go-to-login">Sign In</a>
                    </div>
                </form>
            </div>
            
            <!-- Success Display View (Shown after Registration) -->
            <div id="success-view" class="auth-view hidden-view">
                <div class="header">
                    <div class="success-icon">✓</div>
                    <h1>Account Created</h1>
                    <p>Your unique User ID has been generated. Please save it!</p>
                </div>
                
                <div class="id-display-box">
                    <span>User ID</span>
                    <h2 id="generated-user-id">---</h2>
                </div>
                
                <button type="button" class="btn primary-btn" id="return-to-login">
                    Go to Login
                </button>
            </div>
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
